# Raspberry Pi optimized compose — runs Horizon daily via ofelia scheduler
#
# Setup:
#   1. Copy .env.example to .env and fill in API keys
#   2. Copy data/config.example.json to data/config.json and configure sources
#   3. docker compose -f docker-compose.rpi.yml up -d
#
# Post-run deployment:
#   After Horizon generates summaries, run: ./scripts/pi-deploy.sh
#   Pushes docs/ directly to gh-pages branch — no CI needed.
#
# For one-off manual run:
#   docker compose -f docker-compose.rpi.yml run --rm horizon

services:
  horizon:
    build:
      context: .
      dockerfile: Dockerfile.rpi
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./.env:/app/.env:ro
    environment:
      - TZ=Australia/Sydney
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    # One-shot runner — ofelia will invoke it on schedule
    entrypoint: ["uv", "run", "horizon"]
    command: ["--hours", "24"]

  # ofelia — lightweight cron scheduler for Docker
  ofelia:
    image: mcuadros/ofelia:latest
    container_name: horizon-scheduler
    depends_on:
      - horizon
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --docker
    labels:
      ofelia.enabled: "true"
      # Runs daily at 06:00 Sydney time (20:00 UTC)
      ofelia.job-run.horizon-daily.schedule: "0 20 * * *"
      ofelia.job-run.horizon-daily.container: "horizon"
      ofelia.job-run.horizon-daily.image: "horizon-horizon"
